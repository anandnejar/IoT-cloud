<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SISTec IoT Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center min-h-screen font-sans text-white">
    
    <div class="bg-white/10 backdrop-blur-lg border border-white/20 p-10 rounded-3xl shadow-2xl shadow-blue-900/50 w-full max-w-md mx-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400">Initialize User</h1>
            <p class="text-slate-300 mt-2 text-sm uppercase tracking-widest">System Registration</p>
        </div>

        <form action="/api/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                <input type="text" name="name" required 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input type="email" name="email" required 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" name="password" required 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-cyan-500/30 transform transition hover:-translate-y-1 mt-4">
                Register System
            </button>
        </form>

        <p class="text-center mt-6 text-slate-400 text-sm">
            Already authorized? <a href="index.html" class="text-cyan-400 hover:text-cyan-300 font-semibold transition-colors">Login here</a>
        </p>
    </div>
</body>
</html>
