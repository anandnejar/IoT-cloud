<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SISTec IoT Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation for background */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-bg {
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 animate-bg flex items-center justify-center min-h-screen font-sans text-white">
    
    <!-- Glassmorphism Card -->
    <div class="bg-white/10 backdrop-blur-lg border border-white/20 p-10 rounded-3xl shadow-2xl shadow-blue-900/50 w-full max-w-md mx-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">SISTec IoT</h1>
            <p class="text-slate-300 mt-2 text-sm uppercase tracking-widest">Secure Login</p>
        </div>

        <form action="/api/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" name="email" required 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" name="password" required 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/30 transform transition hover:-translate-y-1">
                Access Dashboard
            </button>
        </form>

        <p class="text-center mt-6 text-slate-400 text-sm">
            New engineer? <a href="register.html" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Create an account</a>
        </p>
    </div>
</body>
</html>
