<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTec IoT Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">

    <!-- Top Navbar (Glass Effect) -->
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-white/10 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.8)]"></div>
            <h1 class="text-xl font-bold tracking-wider text-white">SISTec <span class="text-blue-400">IoT</span></h1>
        </div>
        <div class="bg-white/10 px-4 py-2 rounded-full border border-white/10">
            <span class="text-sm text-slate-400">Operator:</span> 
            <span id="usernameDisplay" class="font-bold text-white ml-1">Loading...</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6 space-y-8 mt-4">
        
        <!-- Section 1: Live Sensor Data -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Temperature Card -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 p-8 rounded-3xl shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-6 opacity-20 transform group-hover:scale-110 transition duration-500">
                    <svg class="w-24 h-24 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M15 13V5A3 3 0 0 0 9 5v8a5 5 0 1 0 6 0zm-3-9a1 1 0 0 1 1 1v3h-2V5a1 1 0 0 1 1-1z"/></svg>
                </div>
                <h3 class="text-slate-400 font-bold tracking-widest text-sm mb-4">LIVE TEMPERATURE</h3>
                <div class="flex items-baseline gap-2">
                    <div id="latestTemp" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-500">-- 'C</div>
                </div>
                <div class="mt-4 flex items-center gap-2 text-sm text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="latestDateTime">--</span>
                </div>
            </div>

            <!-- Humidity Card -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 p-8 rounded-3xl shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-6 opacity-20 transform group-hover:scale-110 transition duration-500">
                    <svg class="w-24 h-24 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.3 0-6-2.7-6-6 0-3.9 6-11.5 6-11.5s6 7.6 6 11.5c0 3.3-2.7 6-6 6z"/></svg>
                </div>
                <h3 class="text-slate-400 font-bold tracking-widest text-sm mb-4">LIVE HUMIDITY</h3>
                <div class="flex items-baseline gap-2">
                    <div id="latestHum" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">-- %</div>
                </div>
                <div class="mt-4 flex items-center gap-2 text-sm text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="latestDateTime2">--</span>
                </div>
            </div>
        </div>

        <!-- Section 2: Hardware Control (LCD) -->
        <div class="bg-slate-800/50 border border-blue-900/50 p-6 rounded-3xl shadow-lg">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Remote LCD Control
            </h3>
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="lcdText" maxlength="16" placeholder="Enter max 16 chars..." 
                       class="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-5 py-3 text-lg outline-none font-mono text-green-400 placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all uppercase">
                <button onclick="submitLCD()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-transform transform hover:scale-105 active:scale-95">
                    TRANSMIT
                </button>
            </div>
        </div>

        <!-- Section 3: Data Logs -->
        <div class="bg-slate-800 border border-slate-700 rounded-3xl shadow-xl overflow-hidden">
            <div class="p-6 border-b border-slate-700 bg-slate-800/50">
                <h3 class="text-lg font-bold text-white">System Data Logs</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900/50 text-slate-400 text-sm uppercase tracking-wider">
                            <th class="p-4 font-semibold">Log ID</th>
                            <th class="p-4 font-semibold">Temperature</th>
                            <th class="p-4 font-semibold">Humidity</th>
                            <th class="p-4 font-semibold">Time</th>
                            <th class="p-4 font-semibold">Date</th>
                            <th class="p-4 font-semibold text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50">
                        <!-- JS Injected Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Logic (Do Not Change) -->
    <script>
        fetch('/api/user').then(res => res.json()).then(data => {
            if(data.error) window.location.href = '/index.html';
            else document.getElementById('usernameDisplay').innerText = data.name;
        });

        function loadData() {
            fetch('/api/records').then(res => res.json()).then(data => {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                if (data.length > 0) {
                    let latest = data[data.length - 1];
                    document.getElementById('latestTemp').innerText = latest.temperature + " 'C";
                    document.getElementById('latestHum').innerText = latest.humidity + " %";
                    let dtStr = `${latest.date} • ${latest.time}`;
                    document.getElementById('latestDateTime').innerText = dtStr;
                    document.getElementById('latestDateTime2').innerText = dtStr;
                }

                // Reverse the array so newest logs show at the top
                [...data].reverse().forEach((row, index) => {
                    let tr = `<tr class="hover:bg-slate-700/30 transition-colors">
                        <td class="p-4 text-slate-500 font-mono text-sm">#${row.id.toString().slice(-4)}</td>
                        <td class="p-4 font-bold text-red-400">${row.temperature} 'C</td>
                        <td class="p-4 font-bold text-blue-400">${row.humidity} %</td>
                        <td class="p-4 text-slate-300">${row.time}</td>
                        <td class="p-4 text-slate-300">${row.date}</td>
                        <td class="p-4 text-right">
                            <button onclick="deleteRow(${row.id})" class="text-slate-500 hover:text-red-400 transition-colors p-2 rounded-lg hover:bg-slate-800">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += tr;
                });
            });
        }

        function deleteRow(id) {
            fetch(`/api/records/${id}`, { method: 'DELETE' }).then(() => loadData());
        }

        function submitLCD() {
            let text = document.getElementById('lcdText').value;
            if(!text) return;
            
            let btn = document.querySelector('button[onclick="submitLCD()"]');
            btn.innerText = "SENDING...";
            
            fetch('/api/lcd', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            }).then(() => {
                btn.innerText = "SENT!";
                btn.classList.replace('bg-blue-600', 'bg-green-500');
                setTimeout(() => {
                    btn.innerText = "TRANSMIT";
                    btn.classList.replace('bg-green-500', 'bg-blue-600');
                    document.getElementById('lcdText').value = '';
                }, 2000);
            });
        }

        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
